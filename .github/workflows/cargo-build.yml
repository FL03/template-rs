name: cargo-build

concurrency:
  cancel-in-progress: false
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches: [main, master]
    tags: [latest, v*, "*-nightly"]
  repository_dispatch:
    types: [wasm, wasm-ci]
  workflow_dispatch:
    inputs:
      target:
        default: 'x86_64-unknown-linux-gnu'
        description: "Which target would you like to compile to?"
        required: false
        type: string
      toolchain:
        default: stable
        description: "Select a toolchain to test (stable, nightly)"
        required: false
        type: choice
        options: [stable, nightly]
      package:
        description: "Which package are we testing?"
        type: string
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  bin:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: [full]
            target: ${{ github.event.inputs.target || 'x86_64-unknown-linux-gnu'}}
            toolchain: ${{ github.event.inputs.toolchain || 'stable' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          target: ${{ matrix.target }}
          toolchain: ${{ matrix.toolchain }}
          override: true
      - name: Build workspace binaries
        run: |
          cargo build --bins --locked --release --workspace \
            --features ${{ matrix.features }} \
            --target ${{ matrix.target }}
  components:
    name: Build WASM Components
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      RUST_TOOLCHAIN: ${{ github.event.inputs.toolchain || 'stable' }}
    strategy:
      fail-fast: false
      matrix:
        package:
            - pzzld-cmp-basic
            - pzzld-cmp-plant
            - pzzld-cmp-worker
        target: [wasm32-wasip1, wasm32-wasip2]
        include:
          - features: wasi
            target: ${{ github.event.inputs.target || 'wasm32-wasip2' }}
            toolchain: ${{ github.event.inputs.toolchain || 'stable' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup dependencies
        run: sudo apt-get install -y pkg-config libssl-dev build-essential
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          target: ${{ matrix.target }}
          toolchain: ${{ matrix.toolchain }}
          override: true
      - name: Setup cargo-component
        if: matrix.target == 'wasm32-wasip1'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component
      - name: Build
        if: matrix.target == 'wasm32-wasip1'
        run: |
          cargo component build -r --locked --workspace \
            --package ${{ matrix.package }} \
            --features ${{ matrix.features }} \
            --target ${{ matrix.target }}
      - name: Build
        if: matrix.target == 'wasm32-wasip2'
        run: |
          cargo build -r --locked --workspace \
            --package ${{ matrix.package }} \
            --features ${{ matrix.features }} \
            --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: components-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/*.wasm
