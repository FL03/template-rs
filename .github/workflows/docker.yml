name: docker

concurrency:
  cancel-in-progress: false
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches: [main, master]
    tags: [latest, v*, "*-nightly"]
  repository_dispatch:
    types: [docker, docker-publish]
  workflow_dispatch:
    inputs:
      dockerfile:
        default: "pzzld.dockerfile"
      tag:
        description: "Set the tag (overrides automatic version detection)"
        required: true
        default: "latest"
        type: string

jobs:
  build:
    name: Build and Push Docker Image
    environment:
      name: docker
      url: https://hub.docker.com/r/${{ matrix.image_name }}
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
    permissions:
      actions: read
      attestations: write
      contents: read
      deployments: write
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        file:
          - .docker/pzzld.dockerfile
        include:
          - registry: docker.io
            image_name: ${{ github.env.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Docker Metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          flavor: latest=true
          images: ${{ matrix.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
      - id: build
        name: Build & Push the image to DockerHub
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./${{ matrix.file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
      - name: Establish Proveance
        uses: actions/attest-build-provenance@v4
        if: github.event.repository.private == false
        id: attestation
        with:
          push-to-registry: true
          subject-digest: ${{ steps.build.outputs.digest }}
          subject-name: ${{ matrix.registry }}/${{ matrix.image_name }}
